<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AI Chat </title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b0b0e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AI Chat">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" href="icon-192.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background-color: #0b0b0e;
            background-image: url('./background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            padding: 0;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.22);
            pointer-events: none;
            z-index: 0;
        }
        
        #particles {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 1;
            pointer-events: none;
        }
        
        .container {
            width: 100%;
            max-width: 100%;
            height: 100vh;
            height: 100dvh;
            background: transparent;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: none;
            position: relative;
            z-index: 2;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(16px) saturate(140%);
            -webkit-backdrop-filter: blur(16px) saturate(140%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .header-title {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.5px;
        }
        
        .header-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .current-model-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.07);
            color: rgba(255, 255, 255, 0.85);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .current-model-pill .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #34d399;
            box-shadow: 0 0 6px #34d399;
        }
        
        .clear-btn {
            padding: 8px 14px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.7);
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        
        .clear-btn:hover {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.35);
            color: #f87171;
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .message {
            padding: 12px 16px;
            border-radius: 14px;
            max-width: 85%;
            word-wrap: break-word;
            white-space: pre-wrap;
            line-height: 1.5;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.user {
            background: rgba(255, 255, 255, 0.16);
            border: 1px solid rgba(255, 255, 255, 0.22);
            color: rgba(255, 255, 255, 0.95);
            align-self: flex-end;
        }
        
        .message.ai {
            background: rgba(20, 20, 24, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.9);
            align-self: flex-start;
            white-space: normal;
        }
        
        .message.ai h1, .message.ai h2, .message.ai h3 {
            font-size: 15px;
            font-weight: 700;
            margin: 10px 0 6px;
            color: #fff;
        }
        
        .message.ai h1:first-child, .message.ai h2:first-child, .message.ai h3:first-child {
            margin-top: 0;
        }
        
        .message.ai p {
            margin: 6px 0;
        }
        
        .message.ai strong {
            color: #fff;
            font-weight: 700;
        }
        
        .message.ai ul, .message.ai ol {
            margin: 6px 0 6px 18px;
        }
        
        .message.ai li {
            margin: 3px 0;
        }
        
        .message.ai hr {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            margin: 10px 0;
        }
        
        .message.ai code {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 5px;
            border-radius: 4px;
            font-size: 12.5px;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        }
        
        .message.ai pre {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px 12px;
            margin: 8px 0;
            overflow-x: auto;
        }
        
        .message.ai pre code {
            background: none;
            padding: 0;
        }
        
        .message.ai table {
            border-collapse: collapse;
            width: 100%;
            margin: 8px 0;
            font-size: 12.5px;
        }
        
        .message.ai th, .message.ai td {
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 6px 8px;
            text-align: left;
        }
        
        .message.ai th {
            background: rgba(255, 255, 255, 0.08);
            font-weight: 600;
        }
        
        .message.info {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.6);
            align-self: center;
            font-size: 12px;
        }
        
        .message.media {
            padding: 6px;
            background: rgba(255, 255, 255, 0.05);
        }
        
        .message.media video,
        .message.media img {
            display: block;
            max-width: 100%;
            max-height: 320px;
            border-radius: 10px;
        }
        
        .msg-thumbnail {
            display: block;
            max-width: 110px;
            max-height: 110px;
            border-radius: 10px;
            margin-bottom: 6px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        .message.typing {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 14px 16px;
        }
        
        .typing-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            animation: typingBounce 1.2s infinite ease-in-out;
        }
        
        .typing-dot:nth-child(2) {
            animation-delay: 0.15s;
        }
        
        .typing-dot:nth-child(3) {
            animation-delay: 0.3s;
        }
        
        @keyframes typingBounce {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            30% {
                transform: translateY(-5px);
                opacity: 1;
            }
        }
        
        .messages::-webkit-scrollbar {
            width: 6px;
        }
        
        .messages::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        
        .messages::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .gen-options {
            display: flex;
            gap: 8px;
            padding: 0 16px 12px;
            overflow-x: auto;
        }
        
        .gen-option {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex-shrink: 0;
        }
        
        .gen-option label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
        }
        
        .gen-option select {
            padding: 7px 8px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.07);
            color: rgba(255, 255, 255, 0.9);
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
        }
        
        .input-area {
            display: flex;
            gap: 10px;
            padding: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px) saturate(140%);
            -webkit-backdrop-filter: blur(16px) saturate(140%);
            position: relative;
            align-items: center;
        }
        
        /* === Model Switcher Widget (button + dropdown), lives next to chat input === */
        .switcher {
            position: relative;
            flex-shrink: 0;
        }
        
        .switcher-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.85);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        
        .switcher-btn:hover, .switcher-btn.open {
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }
        
        .switcher-btn svg {
            width: 19px;
            height: 19px;
        }
        
        .switcher-panel {
            position: absolute;
            bottom: calc(100% + 12px);
            left: 0;
            width: 280px;
            max-height: 60vh;
            overflow-y: auto;
            background: rgba(18, 18, 22, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 18px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.15);
            backdrop-filter: blur(20px) saturate(120%);
            -webkit-backdrop-filter: blur(20px) saturate(120%);
            display: none;
            flex-direction: column;
            z-index: 50;
            animation: panelIn 0.18s ease;
        }
        
        .switcher-panel.open {
            display: flex;
        }
        
        @keyframes panelIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .switcher-header {
            padding: 12px 14px 8px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
        }
        
        .model-list {
            display: flex;
            flex-direction: column;
            padding: 0 8px;
            gap: 4px;
        }
        
        .model-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 10px;
            border-radius: 10px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.75);
            font-size: 13px;
            font-weight: 500;
            transition: all 0.15s ease;
            border: 1px solid transparent;
        }
        
        .model-row:hover {
            background: rgba(255, 255, 255, 0.06);
        }
        
        .model-row.active {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
            color: #fff;
        }
        
        .model-row .radio {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .model-row.active .radio {
            border-color: #fff;
        }
        
        .model-row.active .radio::after {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #fff;
        }
        
        .switcher-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 10px 14px;
        }
        
        .apikey-section {
            padding: 0 14px 14px;
        }
        
        .apikey-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 8px;
        }
        
        .apikey-row {
            display: flex;
            gap: 8px;
        }
        
        .key-select {
            flex: 1;
            padding: 9px 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.85);
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .key-select:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        .key-select:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.5);
        }
        
        .random-btn {
            width: 38px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.7);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        
        .random-btn svg {
            width: 16px;
            height: 16px;
        }
        
        .random-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.9);
        }
        
        .input-area input {
            flex: 1;
            padding: 12px 14px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            background: rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
            transition: all 0.2s ease;
        }
        
        .input-area input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        .input-area input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.1);
        }
        
        .send-btn {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.22);
            color: #fff;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        
        .send-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.35);
        }
        
        .send-btn:disabled {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
        }
        
        .attach-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.85);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }
        
        .attach-btn svg {
            width: 19px;
            height: 19px;
        }
        
        .attach-btn:hover {
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        .attach-btn.active {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.4);
        }
        
        .attached-file {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin: 0 16px 12px;
            padding: 8px 12px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
        }
        
        .attached-file span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .attached-file button {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .attached-file button svg {
            width: 14px;
            height: 14px;
        }
        
        .attached-file button:hover {
            color: rgba(255, 255, 255, 0.95);
        }
        
        @media (max-width: 600px) {
            .container {
                max-width: 100%;
                height: 100vh;
                height: 100dvh;
                border-radius: 0;
                border: none;
            }
            
            .message {
                max-width: 95%;
            }
            
            .switcher-panel {
                width: calc(100vw - 32px);
                max-width: 320px;
            }
        }
    </style>
</head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
<body>
    <canvas id="particles"></canvas>
    <div class="container">
        <div class="header">
            <div class="header-title">AI Chat</div>
            <div class="header-right">
                <div class="current-model-pill" id="currentModelPill">
                    <span class="dot"></span>
                    <span id="currentModelName">Teri</span>
                </div>
                <button class="clear-btn" onclick="clearChat()">Clear</button>
            </div>
        </div>
        
        <div class="messages" id="messages"></div>
        
        <div class="gen-options" id="genOptions" style="display:none;">
            <div class="gen-option">
                <label for="genWidth">Width</label>
                <select id="genWidth" onchange="saveGenOption('width', this.value)"></select>
            </div>
            <div class="gen-option">
                <label for="genHeight">Height</label>
                <select id="genHeight" onchange="saveGenOption('height', this.value)"></select>
            </div>
            <div class="gen-option">
                <label for="genSteps">Steps</label>
                <select id="genSteps" onchange="saveGenOption('steps', this.value)"></select>
            </div>
        </div>
        
        <div class="input-area">
            <div class="switcher" id="switcher">
                <button class="switcher-btn" id="switcherBtn" onclick="toggleSwitcher()" title="Pilih Model & API Key">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="4" y1="7" x2="20" y2="7"></line>
                        <circle cx="9" cy="7" r="2.2"></circle>
                        <line x1="4" y1="17" x2="20" y2="17"></line>
                        <circle cx="15" cy="17" r="2.2"></circle>
                    </svg>
                </button>
                <div class="switcher-panel" id="switcherPanel">
                    <div class="switcher-header">Pilih Model AI</div>
                    <div class="model-list" id="modelList"></div>
                    <div class="switcher-divider"></div>
                    <div class="apikey-section">
                        <div class="apikey-label">API Key</div>
                        <div class="apikey-row">
                            <select id="keySelect" class="key-select" onchange="changeApiKey()"></select>
                            <button class="random-btn" onclick="randomizeApiKey()" title="Random API Key">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="16 3 21 3 21 8"></polyline>
                                    <line x1="4" y1="20" x2="21" y2="3"></line>
                                    <polyline points="21 16 21 21 16 21"></polyline>
                                    <line x1="15" y1="15" x2="21" y2="21"></line>
                                    <line x1="4" y1="4" x2="9" y2="9"></line>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <button class="attach-btn" id="attachBtn" onclick="document.getElementById('imageInput').click()" title="Lampirkan gambar" style="display:none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.5V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h7.5"></path>
                    <circle cx="8.5" cy="9.5" r="1.5"></circle>
                    <path d="M3 16l4.5-4.5a2 2 0 0 1 2.8 0L14 15"></path>
                    <path d="M17 14v6m-3-3h6"></path>
                </svg>
            </button>
            <input type="file" id="imageInput" accept="image/*" style="display:none;" onchange="handleImageSelect(event)">
            <input 
                type="text" 
                id="input" 
                placeholder="Ketik pesan..." 
                onkeypress="handleKeyPress(event)"
            >
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
        <div class="attached-file" id="attachedFile" style="display:none;">
            <span id="attachedFileName"></span>
            <button onclick="clearAttachedImage()" title="Hapus lampiran">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="5" x2="19" y2="19"></line>
                    <line x1="19" y1="5" x2="5" y2="19"></line>
                </svg>
            </button>
        </div>
    </div>

    <script>
        (function () {
            const canvas = document.getElementById("particles");
            const ctx = canvas.getContext("2d");
            const COLORS = ["#ff9ecf", "#ffd166", "#8ecae6", "#b794f6", "#90e0ef", "#ffffff"];
            let particles = [];

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            function createParticles() {
                const count = Math.min(70, Math.max(28, Math.floor((canvas.width * canvas.height) / 16000)));
                particles = Array.from({ length: count }, () => ({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 1.5 + 0.6,
                    color: COLORS[Math.floor(Math.random() * COLORS.length)],
                    speedY: Math.random() * 0.18 + 0.04,
                    speedX: (Math.random() - 0.5) * 0.1,
                    phase: Math.random() * Math.PI * 2,
                    twinkleSpeed: Math.random() * 0.02 + 0.008
                }));
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach((p) => {
                    p.phase += p.twinkleSpeed;
                    const opacity = 0.3 + Math.abs(Math.sin(p.phase)) * 0.55;
                    p.y -= p.speedY;
                    p.x += p.speedX;
                    if (p.y < -5) p.y = canvas.height + 5;
                    if (p.x < -5) p.x = canvas.width + 5;
                    if (p.x > canvas.width + 5) p.x = -5;

                    ctx.globalAlpha = opacity;
                    ctx.fillStyle = p.color;
                    ctx.shadowBlur = p.r * 4;
                    ctx.shadowColor = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.globalAlpha = 1;
                requestAnimationFrame(animate);
            }

            resize();
            createParticles();
            animate();

            window.addEventListener("resize", () => {
                resize();
                createParticles();
            });
        })();

        function populateGenOptions(model) {
            const fields = [

                { id: "genHeight", values: GEN_OPTIONS.height, current: model.extraParams.height },
                { id: "genSteps", values: GEN_OPTIONS.steps, current: model.extraParams.steps }

        async function sendMessage() {
            const model = MODELS[currentModel];
            const text = inputEl.value.trim();
            const isImageEdit = model.type === "image-edit";
            const isImageOnly = model.type === "image-only";
            const needsImage = isImageEdit || isImageOnly;

            if (needsImage && !selectedImageFile) {
                addMessage("Lampirkan gambar dulu sebelum kirim.", "info");
                return;
            }
            if (!needsImage && !text) return;
            if (isImageEdit && !text) return;

            sendBtn.disabled = true;
            inputEl.disabled = true;

            const thumbnailUrl = selectedImageFile ? URL.createObjectURL(selectedImageFile) : null;
            addMessage(text, "user", thumbnailUrl);
            inputEl.value = "";
            showTypingIndicator();

            try {
                const selectedApiKey = API_KEYS[model.selectedKey];
                let response;

                if (needsImage) {
                    const formData = new FormData();
                    if (isImageEdit) {
                        formData.append("prompt", text);
                    }
                    formData.append("apikey", selectedApiKey);
                    formData.append("image", selectedImageFile);
                    response = await fetch(model.url, { method: "POST", body: formData });
                } else {
                    const paramName = model.paramName || "text";
                    const params = new URLSearchParams({
                        [paramName]: text,
                        apikey: selectedApiKey
                    });
                    if (model.extraParams) {
                        Object.entries(model.extraParams).forEach(([k, v]) => params.append(k, v));
                    }
                    if (model.useChatId && chatIds[currentModel]) {
                        params.append("chatId", chatIds[currentModel]);
                    }
                    response = await fetch(`${model.url}?${params}`);
                }

                await handleApiResponse(response, model);

                if (needsImage) {
                    clearAttachedImage();
                }
            } catch (error) {
                hideTypingIndicator();
                addMessage("Error: " + error.message, "ai");
            } finally {
                sendBtn.disabled = false;
                inputEl.disabled = false;
                inputEl.focus();
            }
        }

        function showTypingIndicator() {
            hideTypingIndicator();
            const el = document.createElement("div");
            el.className = "message ai typing";
            el.id = "typingIndicator";
            el.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
            messagesDiv.appendChild(el);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function hideTypingIndicator() {
            const el = document.getElementById("typingIndicator");
            if (el) el.remove();
        }

        async function handleApiResponse(response, model) {
            hideTypingIndicator();
            const contentType = response.headers.get("content-type") || "";

            if (contentType.includes("image/")) {
                const blob = await response.blob();
                addImageMessage(URL.createObjectURL(blob), "ai");
                return;
            }
            if (contentType.includes("video/")) {
                const blob = await response.blob();
                addVideoMessage(URL.createObjectURL(blob), "ai");
                return;
            }

            let data;
            try {
                data = await response.json();
            } catch (e) {
                addMessage("Error: respons tidak dikenali dari server", "ai");
                return;
            }

            if (data.status === false) {
                const errMsg = data.message
                    || data.error
                    || (typeof data.result === "string" ? data.result : null)
                    || JSON.stringify(data);
                addMessage("Error: " + errMsg, "ai");
                return;
            }

            if (model.useChatId && data.chatId) {
                chatIds[currentModel] = data.chatId;
            }

            const result = data.result !== undefined ? data.result : data;

            if (typeof result === "string") {
                addMessage(result, "ai");
            } else if (result && typeof result === "object") {
                const mediaUrl = result.video_url || result.image_url || result.url;
                if (mediaUrl && /\.(mp4|webm|mov)(\?|$)/i.test(mediaUrl)) {
                    addVideoMessage(mediaUrl, "ai");
                } else if (mediaUrl) {
                    addImageMessage(mediaUrl, "ai");
                } else {
                    addMessage(JSON.stringify(result, null, 2), "ai");
                }
            } else {
                addMessage(String(result), "ai");
            }
        }

        function addMessage(text, sender, thumbnailUrl) {
            const msgEl = document.createElement("div");
            msgEl.className = `message ${sender}`;

            if (thumbnailUrl) {
                const thumb = document.createElement("img");
                thumb.src = thumbnailUrl;
                thumb.className = "msg-thumbnail";
                msgEl.appendChild(thumb);
            }

            if (text) {
                const textEl = document.createElement("div");
                if (sender === "ai" && window.marked) {
                    const safeText = text.replace(/~/g, "\\~");
                    const rawHtml = marked.parse(safeText);
                    textEl.innerHTML = window.DOMPurify ? DOMPurify.sanitize(rawHtml) : rawHtml;
                } else {
                    textEl.textContent = text;
                }
                msgEl.appendChild(textEl);
            }

            messagesDiv.appendChild(msgEl);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addVideoMessage(url, sender) {
            const msgEl = document.createElement("div");
            msgEl.className = `message ${sender} media`;
            const video = document.createElement("video");
            video.src = url;
            video.controls = true;
            video.playsInline = true;
            msgEl.appendChild(video);
            messagesDiv.appendChild(msgEl);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addImageMessage(url, sender) {
            const msgEl = document.createElement("div");
            msgEl.className = `message ${sender} media`;
            const img = document.createElement("img");
            img.src = url;
            img.alt = "Hasil gambar";
            msgEl.appendChild(img);
            messagesDiv.appendChild(msgEl);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
